<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSC View // Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
}

/* 動態背景格線 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

/* 掃描線 */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.1) 2px,
    rgba(0,0,0,0.1) 4px
  );
  pointer-events: none;
  z-index: 100;
}

.login-container {
  position: relative;
  width: 400px;
  padding: 48px 40px;
  background: rgba(10, 10, 20, 0.85);
  border: 1px solid rgba(0, 255, 255, 0.2);
  box-shadow:
    0 0 30px rgba(0, 255, 255, 0.1),
    inset 0 0 30px rgba(0, 255, 255, 0.02);
  z-index: 10;
}

/* 四角裝飾 */
.login-container::before,
.login-container::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: #0ff;
  border-style: solid;
}
.login-container::before {
  top: -1px; left: -1px;
  border-width: 2px 0 0 2px;
}
.login-container::after {
  bottom: -1px; right: -1px;
  border-width: 0 2px 2px 0;
}

.logo {
  text-align: center;
  margin-bottom: 8px;
}

.logo h1 {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 900;
  color: #0ff;
  text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
  letter-spacing: 4px;
}

.logo .sub {
  font-size: 11px;
  color: rgba(0, 255, 255, 0.4);
  letter-spacing: 6px;
  margin-top: 4px;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,255,255,0.3), transparent);
  margin: 24px 0;
}

.field {
  margin-bottom: 20px;
}

.field label {
  display: block;
  font-size: 11px;
  color: rgba(0, 255, 255, 0.5);
  letter-spacing: 3px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.field input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(0, 255, 255, 0.03);
  border: 1px solid rgba(0, 255, 255, 0.15);
  color: #0ff;
  font-family: 'Share Tech Mono', monospace;
  font-size: 16px;
  outline: none;
  transition: all 0.3s;
}

.field input:focus {
  border-color: rgba(0, 255, 255, 0.5);
  box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
  background: rgba(0, 255, 255, 0.05);
}

.field input::placeholder {
  color: rgba(0, 255, 255, 0.2);
}

.btn-login {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid #0ff;
  color: #0ff;
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

.btn-login:hover {
  background: rgba(0, 255, 255, 0.1);
  box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
}

.btn-login:active {
  transform: scale(0.98);
}

/* 按鈕掃描動畫 */
.btn-login::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,255,255,0.1), transparent);
  animation: btnScan 3s linear infinite;
}

@keyframes btnScan {
  0% { left: -100%; }
  100% { left: 100%; }
}

.error-msg {
  color: #ff3366;
  font-size: 12px;
  text-align: center;
  margin-top: 16px;
  min-height: 18px;
  text-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
}

.footer-info {
  text-align: center;
  margin-top: 24px;
  font-size: 10px;
  color: rgba(0, 255, 255, 0.2);
  letter-spacing: 2px;
}

/* 粒子背景 */
.particles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #0ff;
  border-radius: 50%;
  opacity: 0;
  animation: float linear infinite;
}

@keyframes float {
  0% { opacity: 0; transform: translateY(100vh); }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-10vh); }
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="login-container">
  <div class="logo">
    <h1>GSC VIEW</h1>
    <div class="sub">SEARCH CONSOLE</div>
  </div>

  <div class="divider"></div>

  <form id="loginForm">
    <div class="field">
      <label>User ID</label>
      <input type="text" id="username" placeholder="enter username" autocomplete="off" autofocus>
    </div>
    <div class="field">
      <label>Access Key</label>
      <input type="password" id="password" placeholder="enter access key">
    </div>
    <button type="submit" class="btn-login">Initialize</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>

  <div class="footer-info">KAORUTSAI.COM // SECURE ACCESS</div>
</div>

<script>
// 粒子效果
const container = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = Math.random() * 10 + 's';
  container.appendChild(p);
}

// 登入邏輯
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  const btn = e.target.querySelector('button');

  btn.textContent = 'CONNECTING...';
  errEl.textContent = '';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass }),
    });

    if (res.ok) {
      const { token } = await res.json();
      localStorage.setItem('gsc_token', token);
      window.location.href = '/';
    } else {
      errEl.textContent = 'ACCESS DENIED // INVALID CREDENTIALS';
      btn.textContent = 'INITIALIZE';
    }
  } catch {
    errEl.textContent = 'CONNECTION FAILED // RETRY';
    btn.textContent = 'INITIALIZE';
  }
});
</script>
</body>
</html>
